services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: studynest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ../StudyNest_Back
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: studynest
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change_me
      JWT_EXPIRATION: 7d
      CORS_ORIGIN: http://localhost:5173
      IA_MODELO: Xenova/clip-vit-base-patch32
      IA_UMBRAL_CONFIANZA: "0.5"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - ia-cache:/app/.ia-cache
    restart: unless-stopped

  frontend:
    build: .
    ports:
      - "5173:80"
    environment:
      - BACKEND_URL=http://backend:3001
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  ia-cache:
